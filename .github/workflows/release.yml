name: Build & Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: Skript
        run: bun install --frozen-lockfile

      - name: Run tests
        working-directory: Skript
        run: bun test

      - name: Build Linux x64
        working-directory: Skript
        run: bun build --compile --target=bun-linux-x64 main.ts --outfile ../Notengenerator-linux

      - name: Build macOS ARM
        working-directory: Skript
        run: bun build --compile --target=bun-darwin-arm64 main.ts --outfile ../Notengenerator-macos

      - name: Build Windows x64
        working-directory: Skript
        run: bun build --compile --target=bun-windows-x64 main.ts --outfile ../Notengenerator-windows.exe

      # Bei Tag-Push: versionierter Release
      - name: Create versioned release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            Notengenerator-linux
            Notengenerator-macos
            Notengenerator-windows.exe

      # Bei Push auf main (kein Tag): rolling "latest" Pre-Release
      - name: Update latest pre-release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build (main)
          prerelease: true
          generate_release_notes: false
          body: |
            Automatischer Build vom letzten Commit auf `main`.
            Für stabile Versionen siehe die [versionierten Releases](../../releases).
          files: |
            Notengenerator-linux
            Notengenerator-macos
            Notengenerator-windows.exe
