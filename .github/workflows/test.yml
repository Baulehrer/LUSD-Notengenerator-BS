name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        working-directory: Skript
        run: bun install --frozen-lockfile
      - name: Tests
        working-directory: Skript
        run: bun test
      - name: Typecheck
        working-directory: Skript
        run: bunx tsc --noEmit
      - name: Lint
        working-directory: Skript
        run: bunx biome check .
